<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风水课程 - 新西兰道观</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #0f0f0f;
            color: #fff;
        }

        /* 顶部导航栏 */
        .video-header {
            background: #212121;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid #303030;
        }

        .back-btn {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: #3f3f3f;
        }

        .video-title-header {
            flex: 1;
            font-size: 18px;
            font-weight: 500;
        }

        /* 主容器 */
        .video-container {
            display: flex;
            max-width: 1920px;
            margin: 0 auto;
            height: calc(100vh - 57px);
        }

        /* 左侧视频区域 */
        .video-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: #0f0f0f;
        }

        /* 视频播放器 */
        .video-player-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            aspect-ratio: 16 / 9;
        }

        .video-player {
            width: 100%;
            height: 100%;
            background: #000;
        }

        /* 视频信息区 */
        .video-info {
            padding: 20px 24px;
        }

        .video-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .video-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #aaa;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .video-description {
            color: #aaa;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        /* 右侧播放列表 */
        .playlist-sidebar {
            width: 400px;
            background: #212121;
            border-left: 1px solid #303030;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .playlist-header {
            padding: 16px 20px;
            border-bottom: 1px solid #303030;
        }

        .playlist-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .playlist-count {
            color: #aaa;
            font-size: 14px;
        }

        .playlist-items {
            flex: 1;
            overflow-y: auto;
        }

        .playlist-item {
            display: flex;
            gap: 12px;
            padding: 12px 20px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #303030;
        }

        .playlist-item:hover {
            background: #3f3f3f;
        }

        .playlist-item.active {
            background: #3f3f3f;
            border-left: 3px solid #3ea6ff;
        }

        .playlist-item-index {
            color: #aaa;
            font-size: 14px;
            min-width: 30px;
        }

        .playlist-item.active .playlist-item-index {
            color: #3ea6ff;
        }

        .playlist-item-thumbnail {
            width: 120px;
            height: 68px;
            background: #000;
            border-radius: 8px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #666;
            position: relative;
            overflow: hidden;
        }

        .playlist-item-thumbnail video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .playlist-item-thumbnail .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            z-index: 1;
        }

        .playlist-item-info {
            flex: 1;
            min-width: 0;
        }

        .playlist-item-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .playlist-item-duration {
            color: #aaa;
            font-size: 12px;
        }

        /* 加载状态 */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #3f3f3f;
            border-top-color: #3ea6ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 错误提示 */
        .error-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            padding: 20px 30px;
            border-radius: 8px;
            text-align: center;
            z-index: 11;
        }

        .error-message h3 {
            color: #ff4444;
            margin-bottom: 10px;
        }

        .error-message p {
            color: #aaa;
            font-size: 14px;
        }

        /* 响应式设计 */
        @media (max-width: 1024px) {
            .playlist-sidebar {
                width: 350px;
            }
        }

        @media (max-width: 768px) {
            .video-container {
                flex-direction: column;
                height: auto;
            }

            .video-header {
                padding: 10px 16px;
            }

            .video-title-header {
                font-size: 16px;
            }

            .playlist-sidebar {
                width: 100%;
                border-left: none;
                border-top: 1px solid #303030;
                max-height: 50vh;
            }

            .video-player-wrapper {
                aspect-ratio: 16 / 9;
            }

            .video-info {
                padding: 16px;
            }

            .video-title {
                font-size: 18px;
            }

            .playlist-item {
                padding: 8px;
            }

            .playlist-item-thumbnail {
                width: 100px;
                height: 56px;
            }

            .playlist-item-title {
                font-size: 13px;
            }

            .playlist-header {
                padding: 12px 16px;
            }
        }

        @media (max-width: 480px) {
            .video-title {
                font-size: 16px;
            }

            .video-meta {
                font-size: 12px;
            }

            .video-description {
                font-size: 13px;
            }

            .playlist-item-thumbnail {
                width: 80px;
                height: 45px;
            }

            .playlist-item-title {
                font-size: 12px;
            }

            .playlist-item-duration {
                font-size: 11px;
            }
        }

        /* 滚动条样式 */
        .playlist-items::-webkit-scrollbar,
        .video-main::-webkit-scrollbar {
            width: 8px;
        }

        .playlist-items::-webkit-scrollbar-track,
        .video-main::-webkit-scrollbar-track {
            background: #0f0f0f;
        }

        .playlist-items::-webkit-scrollbar-thumb,
        .video-main::-webkit-scrollbar-thumb {
            background: #3f3f3f;
            border-radius: 4px;
        }

        .playlist-items::-webkit-scrollbar-thumb:hover,
        .video-main::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>

            { id: 27, title: "风水与传统文化", chapter: "第 27 集", file: "玄空风水27.mp4", duration: "45:30", description: "探讨风水在中国传统文化中的地位、哲学思想和文化传承。" },
            { id: 28, title: "风水误区与辟谣", chapter: "第 28 集", file: "玄空风水28.mp4", duration: "42:20", description: "澄清常见的风水误区、迷信观念和伪科学说法。树立正确认识。" },
            { id: 29, title: "风水学习总结", chapter: "第 29 集", file: "玄空风水29.mp4", duration: "50:05", description: "总结课程要点、学习方法和实践建议。规划未来学习路径。" }
        ];

        let currentCourse = null;
        let currentUser = null;

        // 初始化
        async function init() {
            // 检查登录状态
            const { data: { user } } = await _sb.auth.getUser();
            if (!user) {
                alert('请先登录后观看课程');
                window.location.href = 'courses.html';
                return;
            }
            currentUser = user;

            // 获取 URL 参数
            const urlParams = new URLSearchParams(window.location.search);
            const courseId = parseInt(urlParams.get('id')) || 1;

            // 渲染播放列表
            renderPlaylist();

            // 加载视频
            await loadVideo(courseId);
        }

        // 渲染播放列表
        function renderPlaylist() {
            const container = document.getElementById('playlistItems');
            container.innerHTML = FENG_SHUI_COURSES.map(course => `
                <div class="playlist-item ${currentCourse?.id === course.id ? 'active' : ''}"
                     onclick="loadVideo(${course.id})"
                     data-course-id="${course.id}">
                    <div class="playlist-item-index">${course.id}</div>
                    <div class="playlist-item-thumbnail" id="thumb-${course.id}">
                        <div class="play-icon">▶</div>
                    </div>
                    <div class="playlist-item-info">
                        <div class="playlist-item-title">${course.title}</div>
                        <div class="playlist-item-duration">${course.duration}</div>
                    </div>
                </div>
            `).join('');

            // 异步加载缩略图
            loadThumbnails();
        }

        // 加载视频缩略图（第一帧）
        async function loadThumbnails() {
            for (const course of FENG_SHUI_COURSES) {
                try {
                    const signedUrl = await getSignedUrl(course.file);
                    const thumbContainer = document.getElementById(`thumb-${course.id}`);
                    if (!thumbContainer) continue;

                    // 创建隐藏的 video 元素来获取第一帧
                    const video = document.createElement('video');
                    video.src = signedUrl;
                    video.crossOrigin = 'anonymous';
                    video.muted = true;
                    video.playsInline = true;
                    video.preload = 'metadata';

                    video.addEventListener('loadeddata', function() {
                        // 跳到 0.1 秒处获取第一帧
                        this.currentTime = 0.1;
                    });

                    video.addEventListener('seeked', function() {
                        // 创建 canvas 截取第一帧
                        const canvas = document.createElement('canvas');
                        canvas.width = 120;
                        canvas.height = 68;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                        // 转换为图片并显示
                        const img = document.createElement('img');
                        img.src = canvas.toDataURL('image/jpeg', 0.7);
                        img.style.width = '100%';
                        img.style.height = '100%';
                        img.style.objectFit = 'cover';

                        thumbContainer.innerHTML = '';
                        thumbContainer.appendChild(img);

                        // 添加播放图标
                        const playIcon = document.createElement('div');
                        playIcon.className = 'play-icon';
                        playIcon.textContent = '▶';
                        thumbContainer.appendChild(playIcon);
                    });

                } catch (error) {
                    console.error(`加载缩略图失败 (${course.file}):`, error);
                }
            }
        }

        // 加载视频
        async function loadVideo(courseId) {
            const course = FENG_SHUI_COURSES.find(c => c.id === courseId);
            if (!course) {
                showError('课程不存在');
                return;
            }

            currentCourse = course;

            // 更新 URL（不刷新页面）
            const newUrl = `${window.location.pathname}?id=${courseId}`;
            window.history.pushState({ courseId }, '', newUrl);

            // 更新页面信息
            document.getElementById('headerTitle').textContent = course.title;
            document.getElementById('videoTitle').textContent = course.title;
            document.getElementById('videoChapter').textContent = course.chapter;
            document.getElementById('videoDuration').textContent = course.duration;
            document.getElementById('videoDescription').textContent = course.description;

            // 更新播放列表高亮
            document.querySelectorAll('.playlist-item').forEach(item => {
                item.classList.toggle('active', parseInt(item.dataset.courseId) === courseId);
            });

            // 滚动到当前项
            const activeItem = document.querySelector('.playlist-item.active');
            if (activeItem) {
                activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            // 显示加载状态
            showLoading();

            try {
                // 获取签名 URL
                const signedUrl = await getSignedUrl(course.file);

                // 加载视频
                const video = document.getElementById('videoPlayer');
                video.src = signedUrl;
                video.load();

                // 自动播放
                try {
                    await video.play();
                } catch (e) {
                    console.log('自动播放被阻止，需要用户交互');
                }

                hideLoading();
            } catch (error) {
                console.error('加载视频失败:', error);
                showError(error.message || '视频加载失败，请稍后重试');
            }
        }

        // 获取签名 URL
        async function getSignedUrl(videoFile) {
            const { data: { session } } = await _sb.auth.getSession();
            if (!session) {
                throw new Error('未登录');
            }

            const response = await fetch('/api/get_video_url', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${session.access_token}`
                },
                body: JSON.stringify({
                    video_file: videoFile
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || '获取视频失败');
            }

            const data = await response.json();
            return data.url;
        }

        // 显示加载状态
        function showLoading() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('errorMessage').style.display = 'none';
        }

        // 隐藏加载状态
        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        // 显示错误
        function showError(message) {
            hideLoading();
            document.getElementById('errorText').textContent = message;
            document.getElementById('errorMessage').style.display = 'block';
        }

        // 返回课程列表
        function goBack() {
            window.location.href = 'courses.html';
        }

        // 监听视频播放结束，自动播放下一集
        document.getElementById('videoPlayer').addEventListener('ended', () => {
            if (currentCourse && currentCourse.id < FENG_SHUI_COURSES.length) {
                loadVideo(currentCourse.id + 1);
            }
        });

        // 监听浏览器前进/后退
        window.addEventListener('popstate', (event) => {
            if (event.state && event.state.courseId) {
                loadVideo(event.state.courseId);
            }
        });

        // 页面加载完成后初始化
        init();
    </script>
</body>
</html>
