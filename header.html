  <script>
    (function () {
      var key = 'lang';
      var root = document.documentElement;
      var saved = localStorage.getItem(key);
      var lang = (saved === 'zh' || saved === 'en') ? saved : 'zh';
      root.setAttribute('data-lang', lang);

      function setLang(next) {
        root.setAttribute('data-lang', next);
        localStorage.setItem(key, next);
        window.dispatchEvent(new Event('langchange'));
      }

      var btn = document.getElementById('langToggle');
      if (btn) btn.addEventListener('click', function () {
        setLang(root.getAttribute('data-lang') === 'zh' ? 'en' : 'zh');
      });
      var btnSb = document.getElementById('langToggleSidebar');
      if (btnSb) btnSb.addEventListener('click', function () {
        setLang(root.getAttribute('data-lang') === 'zh' ? 'en' : 'zh');
      });

      // Sidebar
      var sidebar   = document.getElementById('sidebar');
      var overlay   = document.getElementById('sidebarOverlay');
      var hamburger = document.getElementById('navHamburger');
      var closeBtn  = document.getElementById('sidebarClose');

      function openSidebar()  { sidebar.classList.add('open'); overlay.classList.add('open'); document.body.style.overflow='hidden'; }
      function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow=''; }

      if (hamburger) hamburger.addEventListener('click', openSidebar);
      if (closeBtn)  closeBtn.addEventListener('click', closeSidebar);
      if (overlay)   overlay.addEventListener('click', closeSidebar);

      // Auto-mark active link in sidebar
      var path = window.location.pathname.split('/').pop() || 'index.html';
      document.querySelectorAll('.sidebar-nav a').forEach(function(a) {
        if (a.getAttribute('href') === path) a.classList.add('nav-active');
      });
    })();
  </script>
